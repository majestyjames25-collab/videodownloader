<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:40px 20px;}
        .container{max-width:800px;margin:0 auto;background:white;border-radius:30px;padding:40px;text-align:center;}
        h1{font-size:32px;margin-bottom:10px;}
        input{width:70%;padding:15px;margin:20px 0;border:1px solid #ddd;border-radius:10px;}
        button{padding:15px 30px;background:#667eea;color:white;border:none;border-radius:10px;cursor:pointer;}
        .loader{display:none;margin:20px;}
        .error{color:red;margin:10px;}
        .preview{display:none;margin-top:20px;text-align:left;}
        img{max-width:100%;border-radius:10px;}
        .quality-btn{padding:10px;margin:5px;background:#f0f0f0;border:none;border-radius:5px;cursor:pointer;}
    </style>
</head>
<body>
<div class="container">
    <h1>🎥 Video Downloader</h1>
    <p>YouTube, Instagram, TikTok, Twitter, Facebook</p>
    <input type="text" id="urlInput" placeholder="Paste video URL here">
    <br>
    <button onclick="fetchVideo()">Analyze</button>
    <div id="loader" class="loader">Loading...</div>
    <div id="error" class="error"></div>
    <div id="preview" class="preview">
        <img id="thumbnail" src="">
        <h3 id="title"></h3>
        <div id="qualities"></div>
        <button id="downloadBtn" style="display:none;" onclick="downloadVideo()">Download</button>
    </div>
</div>

<script>
let currentUrl = '';
let currentFormat = '';

async function fetchVideo() {
    const url = document.getElementById('urlInput').value;
    if(!url){
        alert('Enter URL');
        return;
    }
    currentUrl = url;
    document.getElementById('loader').style.display = 'block';
    document.getElementById('error').innerHTML = '';
    
    try{
        const res = await fetch('/api/info', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({url:url})
        });
        const data = await res.json();
        if(data.success){
            document.getElementById('preview').style.display = 'block';
            document.getElementById('thumbnail').src = data.thumbnail;
            document.getElementById('title').innerHTML = data.title;
            const qDiv = document.getElementById('qualities');
            qDiv.innerHTML = '<h4>Select Quality:</h4>';
            data.formats.forEach(f => {
                const btn = document.createElement('button');
                btn.className = 'quality-btn';
                btn.innerHTML = f.resolution + ' (' + f.ext + ')';
                btn.onclick = () => {
                    currentFormat = f.format_id;
                    document.getElementById('downloadBtn').style.display = 'block';
                };
                qDiv.appendChild(btn);
            });
        } else {
            document.getElementById('error').innerHTML = data.error;
        }
    } catch(e){
        document.getElementById('error').innerHTML = 'Error: ' + e.message;
    }
    document.getElementById('loader').style.display = 'none';
}

async function downloadVideo() {
    if(!currentFormat){
        alert('Select quality first');
        return;
    }
    document.getElementById('loader').style.display = 'block';
    try{
        const res = await fetch('/api/download', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({url:currentUrl, format_id:currentFormat, type:'video'})
        });
        if(res.ok){
            const blob = await res.blob();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'video.mp4';
            a.click();
        } else {
            alert('Download failed');
        }
    } catch(e){
        alert('Error: ' + e.message);
    }
    document.getElementById('loader').style.display = 'none';
}
</script>
</body>
</html>
